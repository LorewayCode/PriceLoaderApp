version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: price_loader_pg
    restart: always
    environment:
      POSTGRES_DB: priceloader
      POSTGRES_USER: priceloader
      POSTGRES_PASSWORD: priceloader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: price_loader_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
